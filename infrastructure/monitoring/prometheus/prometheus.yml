global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: telemetry

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: telemetry-ingestion
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3001']

  - job_name: telemetry-rules
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3002']

  - job_name: telemetry-notify
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3003']

  - job_name: telemetry-query
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3004']
